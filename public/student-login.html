<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login — StudentOS</title>
  <meta name="description" content="Student portal login for StudentOS college management system." />
  <link rel="stylesheet" href="/css/global.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: auto;
    }

    /* Decorative accents */
    .accent-top {
      position: fixed; top: -100px; right: -100px;
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(200,155,60,0.15) 0%, transparent 65%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .accent-bot {
      position: fixed; bottom: -80px; left: -80px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(31,42,68,0.08) 0%, transparent 65%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .login-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 460px;
    }

    /* Back link */
    .back-link {
      display: inline-flex; align-items: center; gap: 7px;
      color: var(--text-2);
      text-decoration: none;
      font-size: 0.84rem;
      font-weight: 600;
      margin-bottom: 28px;
      transition: var(--t);
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: white;
    }
    .back-link:hover {
      color: var(--navy);
      border-color: var(--navy);
      box-shadow: var(--shadow-sm);
    }

    /* Login box */
    .login-box {
      background: white;
      border-radius: var(--radius-2xl);
      border: 1.5px solid var(--border);
      padding: 40px;
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.4s ease both;
    }

    .login-box::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
    }

    .login-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--navy), var(--navy-light));
      border-radius: var(--radius-xl);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem;
      margin-bottom: 22px;
      box-shadow: 0 6px 20px rgba(31,42,68,0.25);
    }

    .login-box h1 {
      font-family: var(--font-heading);
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 5px;
      line-height: 1.1;
    }

    .login-box h1 span { color: var(--gold); }

    .subtitle {
      color: var(--text-2);
      font-size: 0.88rem;
      margin-bottom: 26px;
      line-height: 1.6;
    }

    /* Info pill */
    .info-pill {
      display: flex; align-items: flex-start; gap: 10px;
      background: var(--gold-pale);
      border: 1px solid rgba(200,155,60,0.2);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      font-size: 0.8rem;
      color: var(--text-2);
      margin-bottom: 24px;
      line-height: 1.55;
    }

    .info-pill .icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }

    /* Error box */
    .error-box {
      background: var(--red-bg);
      border: 1px solid rgba(220,38,38,0.22);
      border-radius: var(--radius-lg);
      padding: 10px 16px;
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--red);
      display: none;
      margin-bottom: 16px;
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--navy);
      border: none;
      border-radius: 14px;
      color: white;
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--t);
      margin-top: 6px;
      letter-spacing: 0.01em;
    }
    .btn-submit:hover {
      background: var(--navy-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(31,42,68,0.28);
    }
    .btn-submit:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Footer link */
    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.82rem;
      color: var(--text-2);
    }
    .login-footer a {
      color: var(--gold);
      font-weight: 700;
      text-decoration: none;
    }
    .login-footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .login-box { padding: 28px 22px; }
      .login-box h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="accent-top"></div>
  <div class="accent-bot"></div>

  <div class="login-wrap">
    <a href="/" class="back-link" id="backHomeLink">← Back to Home</a>

    <div class="login-box">
      <div class="login-icon">🧑‍🎓</div>
      <h1>Student <span>Portal</span></h1>
      <p class="subtitle">Enter your details to access your academic dashboard.</p>

      <div class="info-pill">
        <span class="icon">💡</span>
        <span>First time? Register your details below. Once approved by the class incharge, you will be able to log in instantly.</span>
      </div>

      <div id="errorBox" class="error-box"></div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="studentName" placeholder="e.g. Rahul Kumar" autocomplete="name" />
      </div>
      <div class="form-group">
        <label>Course / Branch</label>
        <input type="text" id="studentCourse" placeholder="e.g. B.Tech CSE" />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="studentEmail" placeholder="e.g. rahul@college.edu" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Roll Number</label>
        <input type="text" id="studentRoll" placeholder="e.g. 22CS001" />
      </div>

      <button class="btn-submit" id="loginBtn" onclick="studentLogin()">
        Enter Student Portal →
      </button>

      <div class="login-footer">
        Class Incharge? <a href="/incharge-login.html">Login here →</a>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>
  <script src="/js/api.js"></script>
  <script>
    if (localStorage.getItem('currentStudent')) window.location.href = '/student-dashboard.html';

    async function studentLogin() {
      const name        = document.getElementById('studentName').value.trim();
      const course      = document.getElementById('studentCourse').value.trim();
      const email       = document.getElementById('studentEmail').value.trim();
      const roll_number = document.getElementById('studentRoll').value.trim();
      const errEl       = document.getElementById('errorBox');
      const btn         = document.getElementById('loginBtn');

      errEl.style.display = 'none';

      if (!name || !course || !email || !roll_number) {
        errEl.textContent = '⚠️ All fields are required.';
        errEl.style.display = 'block'; return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errEl.textContent = '⚠️ Please enter a valid email address.';
        errEl.style.display = 'block'; return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing you in…';

      try {
        const data = await api.student.login({ name, course, email, roll_number });
        if (data.pendingApproval) {
          errEl.innerHTML = `⏳ <strong>Registration Sent!</strong><br>Your registration is pending approval from the class incharge. Please contact your incharge to approve your account.`;
          errEl.style.backgroundColor = 'var(--amber-bg)';
          errEl.style.color = 'var(--amber)';
          errEl.style.borderColor = 'rgba(217,119,6,0.2)';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Enter Student Portal →';
          showToast('Registration pending incharge approval ⏳', 'warning');
        } else {
          localStorage.setItem('currentStudent', JSON.stringify(data.student));
          showToast('Welcome! Redirecting to your portal…', 'success');
          setTimeout(() => { window.location.href = '/student-dashboard.html'; }, 700);
        }
      } catch (err) {
        errEl.innerHTML = '❌ ' + err.message;
        errEl.style.backgroundColor = 'var(--red-bg)';
        errEl.style.color = 'var(--red)';
        errEl.style.borderColor = 'rgba(220,38,38,0.2)';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Enter Student Portal →';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') studentLogin(); });
  </script>
</body>
</html>
