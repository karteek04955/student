<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incharge Login — StudentOS</title>
  <meta name="description" content="Class Incharge portal login for StudentOS." />
  <link rel="stylesheet" href="/css/global.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: auto;
    }

    .accent-top {
      position: fixed; top: -100px; left: -100px;
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(31,42,68,0.09) 0%, transparent 65%);
      border-radius: 50%;
      pointer-events: none; z-index: 0;
    }
    .accent-bot {
      position: fixed; bottom: -80px; right: -80px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(200,155,60,0.12) 0%, transparent 65%);
      border-radius: 50%;
      pointer-events: none; z-index: 0;
    }

    .login-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
    }

    .back-link {
      display: inline-flex; align-items: center; gap: 7px;
      color: var(--text-2);
      text-decoration: none;
      font-size: 0.84rem;
      font-weight: 600;
      margin-bottom: 28px;
      transition: var(--t);
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: white;
    }
    .back-link:hover {
      color: var(--navy);
      border-color: var(--navy);
      box-shadow: var(--shadow-sm);
    }

    .login-box {
      background: white;
      border-radius: var(--radius-2xl);
      border: 1.5px solid var(--border);
      padding: 40px;
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.4s ease both;
    }

    .login-box::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--navy), var(--navy-light));
    }

    .login-icon {
      width: 60px; height: 60px;
      background: var(--gold);
      border-radius: var(--radius-xl);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem;
      margin-bottom: 22px;
      box-shadow: 0 6px 20px rgba(200,155,60,0.35);
    }

    .login-box h1 {
      font-family: var(--font-heading);
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 5px;
      line-height: 1.1;
    }
    .login-box h1 span { color: var(--gold); }

    .subtitle {
      color: var(--text-2);
      font-size: 0.88rem;
      margin-bottom: 26px;
      line-height: 1.6;
    }

    /* Credentials pill */
    .creds-pill {
      display: flex; align-items: center; gap: 10px;
      background: rgba(31,42,68,0.04);
      border: 1px solid rgba(31,42,68,0.1);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      font-size: 0.8rem;
      color: var(--text-2);
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 6px;
    }

    .creds-pill code {
      background: rgba(31,42,68,0.07);
      color: var(--navy);
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .error-box {
      background: var(--red-bg);
      border: 1px solid rgba(220,38,38,0.22);
      border-radius: var(--radius-lg);
      padding: 10px 16px;
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--red);
      display: none;
      margin-bottom: 16px;
    }

    /* Password wrapper */
    .pw-wrapper { position: relative; }
    .pw-wrapper input { padding-right: 50px; }
    .pw-toggle {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; font-size: 1rem;
      color: var(--text-3);
      transition: var(--t);
      padding: 4px;
    }
    .pw-toggle:hover { color: var(--navy); }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      border: none;
      border-radius: 14px;
      color: var(--navy);
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--t);
      margin-top: 6px;
      letter-spacing: 0.01em;
    }
    .btn-submit:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(200,155,60,0.35);
    }
    .btn-submit:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.82rem;
      color: var(--text-2);
    }
    .login-footer a {
      color: var(--navy);
      font-weight: 700;
      text-decoration: none;
    }
    .login-footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .login-box { padding: 28px 22px; }
      .login-box h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="accent-top"></div>
  <div class="accent-bot"></div>

  <div class="login-wrap">
    <a href="/" class="back-link" id="backHomeLink">← Back to Home</a>

    <div class="login-box">
      <div class="login-icon">👩‍🏫</div>
      <h1>Incharge <span>Portal</span></h1>
      <p class="subtitle">Administrator access to manage your class and students.</p>

      <div class="creds-pill">
        🔑 Default credentials: <code>incharge</code> / <code>incharge123</code>
      </div>

      <div id="errorBox" class="error-box"></div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="inchargeUser" placeholder="incharge" value="incharge" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrapper">
          <input type="password" id="inchargePass" placeholder="••••••••" value="incharge123" autocomplete="current-password" />
          <button class="pw-toggle" onclick="togglePw()" type="button" id="pwBtn">👁️</button>
        </div>
      </div>

      <button class="btn-submit" id="loginBtn" onclick="inchargeLogin()">
        Enter Incharge Portal →
      </button>

      <div class="login-footer">
        Student? <a href="/student-login.html">Login here →</a>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>
  <script src="/js/api.js"></script>
  <script>
    if (localStorage.getItem('inchargeUser')) window.location.href = '/incharge-dashboard.html';

    async function inchargeLogin() {
      const username = document.getElementById('inchargeUser').value.trim();
      const password = document.getElementById('inchargePass').value.trim();
      const errEl    = document.getElementById('errorBox');
      const btn      = document.getElementById('loginBtn');

      errEl.style.display = 'none';

      if (!username || !password) {
        errEl.textContent = '⚠️ Please fill in both fields.';
        errEl.style.display = 'block'; return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing you in…';

      try {
        const data = await api.incharge.login({ username, password });
        localStorage.setItem('inchargeUser', JSON.stringify(data.incharge));
        showToast('Welcome back, ' + data.incharge.username + '!', 'success');
        setTimeout(() => { window.location.href = '/incharge-dashboard.html'; }, 700);
      } catch (err) {
        errEl.textContent = '❌ ' + err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Enter Incharge Portal →';
      }
    }

    function togglePw() {
      const input = document.getElementById('inchargePass');
      const btn   = document.getElementById('pwBtn');
      input.type  = input.type === 'password' ? 'text' : 'password';
      btn.textContent = input.type === 'password' ? '👁️' : '🙈';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') inchargeLogin(); });
  </script>
</body>
</html>
